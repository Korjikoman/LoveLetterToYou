<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout (
        title='Create Letter',
        content = ~{::content},
        styles = ~{::styles},
        scripts = ~{::scripts}
    )}">
<head>
    <div th:fragment="styles">
        <link rel="stylesheet" href="/css/create_letter.css">
    </div>

</head>

<body>


<main>
    <div th:fragment="content">
        <div class="letter-card">
            <h1>💌 Write Your Letter</h1>
            
            <form th:action="@{/create/letter}" method="POST">
                <div class="form-group">
                    <input
                        type="text"
                        id="letterTitle"
                        name="title"
                        class="letter-title"
                        placeholder="Letter title… 💗"
                        maxlength="120"
                        required />
                </div>


                <div class="form-group">
                    <textarea 
                        id="letterContent" 
                        name="content" 
                        placeholder="My dearest love, 💕&#10;&#10;Today I want to tell you...&#10;&#10;With all my heart,"
                        required></textarea>
                </div>
            </form>
            <div class="btn-container">
                <button type="button" id="createButton" class="btn-create">
                    <span>Send Love Letter</span>
                </button>
            </div>
            <p style="
                margin-top: 1.5rem;
                font-size: 0.9rem;
                color: #9370DB;
                font-family: 'Robosto', sans-serif;
                opacity: 0.8;
                ">
                ✨ Your words will be kept safe in our digital heart ✨
            </p>
        </div>

    </div>
    
</main>

</body>
<div th:fragment="scripts">
    <script>
        const createLetterButton = document.getElementById("createButton");

        createLetterButton.addEventListener('click', () => {
            const letterContent = document.getElementById('letterContent');
            const letterText = letterContent.value.trim();
            const title = document.getElementById('letterTitle').value.trim();
            if (!letterText) {
                alert('Please fill this letter with magic of love 💕');
                letterContent.focus();
                return;
            }

            fetch('/create/letter', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: letterText, title: title})
            })
            .then(response => response.text())
            .then(data => {
                showSuccessModal(data);
            })
            .catch(() => {
                alert('Network error 🥀');
            });
        });

        function showSuccessModal(letterUrl) {
            fetch("/create/letter/geturl")
            .then(response => response.text())
            .then(html => {
                document.body.insertAdjacentHTML('beforeend', html);
                document.getElementById('letterUrl').value = letterUrl;
            })
            .catch(() => {
                alert('Cannot load modal :(');
            })
        

            
        }

    </script>
    
</div>
</html>
