<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Enter Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;500&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/confirm-password.css">
</head>
<body>
<div class="letter-container">
    <div class="letter-card">
        <h2>🔒 Protected Letter</h2>
        <p>Enter the password to view the letter 💌</p>

        <form th:action="@{'/watch/letter/' + ${publicToken}}" method="post">
            <div id="passwordInputs" class="password-inputs">
                <input type="text" maxlength="1" pattern="[A-Za-z0-9]" class="password-char">
                <input type="text" maxlength="1" pattern="[A-Za-z0-9]" class="password-char">
                <input type="text" maxlength="1" pattern="[A-Za-z0-9]" class="password-char">
                <input type="text" maxlength="1" pattern="[A-Za-z0-9]" class="password-char">
                <input type="text" maxlength="1" pattern="[A-Za-z0-9]" class="password-char">
            </div>
            <button type="submit" class="btn-small">Unlock Letter</button>
            <p th:if="${error}" class="error-msg" th:text="${error}"></p>
        </form>
    </div>
</div>

<script>
    const passwordInputs = document.querySelectorAll('.password-char');
    const form = document.querySelector('form');

    passwordInputs.forEach((input, idx) => {
        input.addEventListener('input', () => {
            if(input.value.length === 1 && idx < passwordInputs.length - 1){
                passwordInputs[idx+1].focus();
            }
        });
    });

    form.addEventListener('submit', e => {
        const password = Array.from(passwordInputs).map(i => i.value).join('');
        const hiddenInput = document.createElement('input');
        hiddenInput.type = 'hidden';
        hiddenInput.name = 'password';
        hiddenInput.value = password;
        e.target.appendChild(hiddenInput);
    });
</script>
</body>
</html>
