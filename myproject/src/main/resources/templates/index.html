<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(
          title='Romantic Homepage',
          content=~{::content}
      )}">

<div th:fragment="content">

    <div class="welcome-card"
         style="display:flex;justify-content:center;align-items:center;
                min-height:calc(100vh - 300px);">

        <div style="
            background:#fff;
            max-width:750px;
            padding:3rem;
            border-radius:20px;
            text-align:center;
            box-shadow:0 12px 30px rgba(0,0,0,.15);
        ">

            <h1 style="
                font-family:'Great Vibes', cursive;
                font-size:3rem;
                color:#C14B4B;
                margin-bottom:1.5rem;
            ">
                Welcome
            </h1>

            <p style="
                font-family:'Playfair Display', serif;
                font-size:1.2rem;
                line-height:1.8;
            ">
                This place was created for words that aren't correct to say out loud.
                Real love prefers silence.
            </p>

        </div>
    </div>

</div>

</html>
