<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout (
        title='MY letters',
        content = ~{::content},
        styles = ~{::styles},
        scripts = ~{::scripts}
    )}">
<head>
    <div th:fragment="styles">
        <link rel="stylesheet" href="/css/list-of-letters.css">
    </div>
</head>
<body>
    <main>
    <div th:fragment="content">
        <div class="letters-container">
            <h2>My Letters</h2>
            <div th:if="${param.success}" class="alert alert-success" role="alert">
                Letter was successfully updated!
            </div>
            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                Something went wrong. Please try again.
            </div>
            <div th:if="${#lists.isEmpty(letters)}">
                <p>No letters yet. <a th:href="@{/create/letter}">Create one</a>.</p>
            </div>

            <div class="letter-card" th:each="letter : ${letters}" 
                th:data-public-token="${letter.publicToken}">
                <div class="letter-header">
                    <h4 th:text="${letter.title}">Letter Title</h4>
                    <button class="btn btn-sm btn-outline-primary edit-btn">Edit</button>
                </div>
                <div class="letter-body">
                    <p th:text="${letter.text}">Letter text...</p>
                </div>
            </div>

        </div>
    </div>
</main>

</body>


<div th:fragment="scripts">
    <script>
        const editButtons = document.querySelectorAll('.edit-btn');

        editButtons.forEach(button => {
            button.addEventListener('click', () => {
                const card = button.closest('.letter-card');
                const publicToken = card.dataset.publicToken;

                // Редирект на страницу редактирования
                window.location.href = '/letters/edit?publicToken=' + encodeURIComponent(publicToken);
            });
        });
    </script>
    
</div>
</html>
